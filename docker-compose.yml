services:

  loadbalancer:
    image: nginx:latest
    container_name: terrain-lb
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web1
      - web2

  web1:
    image: terrain-rental-app
    container_name: terrain-web1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3307/rin_nairith-db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hello@123
    depends_on:
      - mysql

  web2:
    image: terrain-rental-app
    container_name: terrain-web2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3307/rin_nairith-db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hello@123
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: terrain-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: rin_nairith-db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8085:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: Hello@123
    depends_on:
      - mysql

volumes:
  mysql_data: