version: "3.9"

services:

  web:
    image: php:8.3-apache
    container_name: terrain-web

    ports:
      - "8080:80"
      - "2222:22"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: terrain-mysql

    restart: always

    environment:
      # MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: rin_nairith-db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: